<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" />
    <link rel="stylesheet" href="../CSS/contailidad.css">
    <title>Formulario Contabilidad</title>
</head>

<body>
    <div class="container">
        <div class="field">
            <label class="label">Ventas</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input" id="Ventas">
            </div>
        </div>

        <div class="field">
            <label class="label">Fecha</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input" id="Fecha">
            </div>
        </div>

        <div class="field">
            <label class="label">Ingresos</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input" id="Ingresos">
            </div>
        </div>

        <div class="field">
            <label class="label">Egresos</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input" id="Egresos">
            </div>
        </div>

        <div class="field">
            <label class="label">Concepto</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input" id="Concepto">
            </div>
        </div>

        <div class="field">
            <label class="label">Valor</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input" id="Valor">
            </div>
        </div>



        <div class="field">
            <div class="control">
                <label class="checkbox">
                    <input type="checkbox">
                    I agree to the <a href="#">terms and conditions</a>
                </label>
            </div>
        </div>


        <div class="field is-grouped">
            <div class="control">
                <button class="button is-link" id="btn-guardar">Guardar</button>
            </div>
            <div class="control">
                <a class="button is-link is-light" type="button" href="../index.html">inicio</a>
            </div>
        </div>

    </div>
    <script src="../JS/contabilidad.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" />
    <link rel="stylesheet" href="../CSS/usuarios.css">
    <title>Formulario Usuarios</title>
</head>

<body>
    <div class="container">
        <div class="field">
            <label class="label">Nombre_completo</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input" id="Nombre_completo">
            </div>
        </div>

        <div class="field">
            <label class="label">Usuario</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input" id="Usuario">
            </div>
        </div>

        <div class="field">
            <label class="label">Estado_civil</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input" id="Estado_civil">
            </div>
        </div>

        <div class="field">
            <label class="label">profesion</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input" id="profesion">
            </div>
        </div>


        <div class="field">
            <label class="label">Fecha_nacimiento</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input" id="Fecha_nacimiento">
            </div>
        </div>

        <div class="field">
            <label class="label">Documento_Identidad</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input" id="Documento_identidad">
            </div>
        </div>

        <div class="field">
            <label class="label">Contraseña</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input" id="Contraseña">
            </div>
        </div>


        <div class="field">
            <label class="label">Direccion</label>
            <div class="control">
                <input class="input" type="text" placeholder="Text input" id="Direccion">
            </div>
        </div>
        <div class="field">
            <label class="label">Rol</label>
            <div class="control">
                <div class="select">
                    <select id="Rol">
                        <option>cliente</option>
                        <option>empleado</option>
                        <option>administracion</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="field">
            <label class="label">Telefono</label>
            <div class="control has-icons-left has-icons-right">
                <input class="input" type="text" placeholder="Text input" id="Telefono">
                <span class="icon is-small is-left">
                    <i class="fas fa-user"></i>
                </span>
                <span class="icon is-small is-right">
                    <i class="fas fa-check"></i>
                </span>
            </div>
            <p class="help is-success">el telefono es adecuado</p>
        </div>

        <div class="field">
            <label class="label">Email</label>
            <div class="control has-icons-left has-icons-right">
                <input class="input" type="email" placeholder="Email input" id="Email">
                <span class="icon is-small is-left">
                    <i class="fas fa-envelope"></i>
                </span>
                <span class="icon is-small is-right">
                    <i class="fas fa-exclamation-triangle"></i>
                </span>
            </div>
        </div>

        <div class="field">
            <label class="label">genero</label>
            <div class="control">
                <div class="select">
                    <select>
                        <option>masculino</option>
                        <option>femenino</option>
                        <option>otro</option>
                    </select>
                </div>
            </div>
        </div>


        <div class="field">
            <div class="control">
                <label class="checkbox">
                    <input type="checkbox">
                    I agree to the <a href="#">terms and conditions</a>
                </label>
            </div>
        </div>


        <div class="field is-grouped">
            <div class="control">
                <button class="button is-link" id="btn-guardar">guardar</button>
            </div>
            <div class="control">
                <a class="button is-link is-light" type="button" href="../index.html">inicio</a>
            </div>
        </div>

    </div>
    <script src="../JS/Usuarios.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
